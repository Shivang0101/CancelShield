version: "3.9"

# ============================================================
# CancelShield — docker-compose.yml
# One command starts all four services:
#   docker-compose up --build
#
# Services:
#   postgres  :5432  — MLflow metadata backend
#   mlflow    :5000  — Experiment tracking UI
#   api       :8000  — FastAPI prediction endpoints
#   dashboard :8050  — Plotly Dash hotel manager UI
# ============================================================

services:

  # ----------------------------------------------------------
  # PostgreSQL — MLflow metadata store
  # ----------------------------------------------------------
  postgres:
    image: postgres:15-alpine
    container_name: cancelshield-postgres
    environment:
      POSTGRES_USER: mlflow
      POSTGRES_PASSWORD: mlflow_secret
      POSTGRES_DB: mlflow
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U mlflow"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  # ----------------------------------------------------------
  # MLflow Tracking Server
  # ----------------------------------------------------------
  mlflow:
    image: python:3.11-slim
    container_name: cancelshield-mlflow
    command: >
      bash -c "pip install mlflow psycopg2-binary boto3 --quiet &&
               mlflow server
               --backend-store-uri postgresql://mlflow:mlflow_secret@postgres:5432/mlflow
               --default-artifact-root /mlflow/artifacts
               --host 0.0.0.0
               --port 5000"
    volumes:
      - mlflow_artifacts:/mlflow/artifacts
    ports:
      - "5000:5000"
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      MLFLOW_TRACKING_URI: http://mlflow:5000
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5000/health"]
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 30s
    restart: unless-stopped

  # ----------------------------------------------------------
  # FastAPI — Prediction API
  # ----------------------------------------------------------
  api:
    build:
      context: .
      dockerfile: Dockerfile
      target: base
    container_name: cancelshield-api
    command: uvicorn src.api.main:app --host 0.0.0.0 --port 8000 --workers 2
    volumes:
      - ./models:/app/models        # Persist trained model files
      - ./data:/app/data            # Dataset mount
      - ./config:/app/config
    ports:
      - "8000:8000"
    environment:
      MLFLOW_TRACKING_URI: http://mlflow:5000
      API_BASE_URL: http://api:8000
      PYTHONPATH: /app
    depends_on:
      mlflow:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 20s
      timeout: 10s
      retries: 5
      start_period: 40s
    restart: unless-stopped

  # ----------------------------------------------------------
  # Plotly Dash — Hotel Manager Dashboard
  # ----------------------------------------------------------
  dashboard:
    build:
      context: .
      dockerfile: Dockerfile
      target: base
    container_name: cancelshield-dashboard
    command: python src/dashboard/app.py
    volumes:
      - ./config:/app/config
    ports:
      - "8050:8050"
    environment:
      API_BASE_URL: http://api:8000
      PYTHONPATH: /app
    depends_on:
      api:
        condition: service_healthy
    restart: unless-stopped

volumes:
  postgres_data:
  mlflow_artifacts:

networks:
  default:
    name: cancelshield-network