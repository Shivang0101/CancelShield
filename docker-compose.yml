version: "3.9"

# One command starts the service:
#   docker-compose up --build
#
# Services:
#   api  :8000  — FastAPI prediction endpoints
#
# MLflow tracking uses local SQLite (mlflow.db) — no separate DB needed.
# Run MLflow UI locally: mlflow ui --backend-store-uri sqlite:///mlflow.db

services:

  # FastAPI — Prediction API

  api:
    build:
      context: .
      dockerfile: Dockerfile
      target: base
    container_name: cancelshield-api
    command: uvicorn src.api.main:app --host 0.0.0.0 --port 8000 --workers 2
    volumes:
      - ./models:/app/models        # Persist trained model files
      - ./data:/app/data            # Dataset mount
      - ./config:/app/config
    ports:
      - "8000:8000"
    environment:
      MLFLOW_TRACKING_URI: sqlite:///mlflow.db
      PYTHONPATH: /app
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 20s
      timeout: 10s
      retries: 5
      start_period: 40s
    restart: unless-stopped


networks:
  default:
    name: cancelshield-network